name: Build cross-platform packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --locked

  desktop:
    name: Build ${{ matrix.name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-latest
            target: aarch64-apple-darwin
          - name: macOS Intel
            runner: macos-latest
            target: x86_64-apple-darwin
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Tauri package
        uses: tauri-apps/tauri-action@v1
        with:
          args: --target ${{ matrix.target }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: icoding-client-[platform]-[arch]-[bundle]

  linux:
    name: Build Linux x64
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package binary
        run: tar -C target/release -czf icoding-client-linux-x86_64.tar.gz icoding-client

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: icoding-client-linux-x86_64
          path: icoding-client-linux-x86_64.tar.gz
          if-no-files-found: error
